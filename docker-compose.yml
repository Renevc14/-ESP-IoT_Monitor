services:
  # ─── Infrastructure ───────────────────────────────────────────
  postgres-timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: iot-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot}
      POSTGRES_DB: ${POSTGRES_DB:-iot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iot} -d ${POSTGRES_DB:-iot}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [iot_network]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: iot-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      # check_port_connectivity waits until the AMQP listener actually accepts
      # client connections (plain "ping" reports healthy too early, causing
      # consumers to crash on first boot with "Connection refused").
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks: [iot_network]

  redis:
    image: redis:7-alpine
    container_name: iot-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks: [iot_network]

  # MailHog: SMTP de demostración para notificaciones de alertas (UI en :8025)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: iot-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped
    networks: [iot_network]

  # ─── Backend Microservices ────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: iot-gateway
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://iot:iot@postgres-timescale:5432/iot}
      REDIS_URL: redis://redis:6379
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      ANALYTICS_SERVICE_URL: http://analytics:8004
      ALERTS_URL: http://alerts:8003
      INGESTION_URL: http://ingestion:8001
      PROCESSING_URL: http://processing:8002
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-no-reply@iot.local}
    depends_on:
      postgres-timescale:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [iot_network]

  ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    container_name: iot-ingestion
    ports:
      - "8001:8001"
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      EXCHANGE_NAME: sensor_data_exchange
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [iot_network]

  processing:
    build:
      context: ./processing
      dockerfile: Dockerfile
    container_name: iot-processing
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://iot:iot@postgres-timescale:5432/iot}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      EXCHANGE_NAME: sensor_data_exchange
      QUEUE_NAME: processing_queue
      REDIS_CACHE_TTL: 300
    depends_on:
      postgres-timescale:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [iot_network]

  alerts:
    build:
      context: ./alerts
      dockerfile: Dockerfile
    container_name: iot-alerts
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://iot:iot@postgres-timescale:5432/iot}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      EXCHANGE_NAME: sensor_data_exchange
      QUEUE_NAME: alerts_queue
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-alerts@iot.local}
      ALERT_EMAILS: ${ALERT_EMAILS:-}
    depends_on:
      postgres-timescale:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [iot_network]

  analytics:
    build:
      context: ./analytics
      dockerfile: Dockerfile
    container_name: iot-analytics
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://iot:iot@postgres-timescale:5432/iot}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      EXCHANGE_NAME: sensor_data_exchange
      QUEUE_NAME: analytics_queue
    depends_on:
      postgres-timescale:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [iot_network]

  # ─── Simulator ───────────────────────────────────────────────
  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: iot-simulator
    environment:
      GATEWAY_URL: http://gateway:8000
      INGESTION_URL: http://ingestion:8001
      OPERATOR_EMAIL: ${OPERATOR_EMAIL:-operator@iot.local}
      OPERATOR_PASSWORD: ${OPERATOR_PASSWORD:-Operator1234!}
      MODE: ${MODE:-continuous}
      INTERVAL: ${INTERVAL:-60}
    depends_on:
      gateway:
        condition: service_healthy
      ingestion:
        condition: service_healthy
    profiles:
      - simulator
    restart: "no"
    networks: [iot_network]

  # ─── Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_GATEWAY_URL: ${VITE_GATEWAY_URL:-http://localhost:8000}
        VITE_ANALYTICS_URL: ${VITE_ANALYTICS_URL:-http://localhost:8004}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8003}
    container_name: iot-frontend
    ports:
      - "80:80"
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    networks: [iot_network]

# ─── Networks & Volumes ──────────────────────────────────────────
networks:
  iot_network:
    driver: bridge

volumes:
  pg-data:
  rabbitmq-data:
  redis-data:
