# Topes de memoria por tipo de servicio (aplicados por `docker compose` como límites).
x-deploy-app: &deploy-app
  resources:
    limits:
      memory: 384M
x-deploy-db: &deploy-db
  resources:
    limits:
      memory: 512M
x-deploy-ts: &deploy-ts
  resources:
    limits:
      memory: 1024M
x-deploy-mq: &deploy-mq
  resources:
    limits:
      memory: 768M
x-deploy-small: &deploy-small
  resources:
    limits:
      memory: 256M

services:
  # ─── Bases de datos (una por servicio) ────────────────────────
  identity-db:
    image: postgres:16-alpine
    container_name: iot-identity-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot}
      POSTGRES_DB: ${POSTGRES_DB:-iot}
    volumes:
      - ./db/identity:/docker-entrypoint-initdb.d:ro
      - identity-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iot} -d ${POSTGRES_DB:-iot}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy: *deploy-db
    networks: [iot_network]

  registry-db:
    image: postgres:16-alpine
    container_name: iot-registry-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot}
      POSTGRES_DB: ${POSTGRES_DB:-iot}
    volumes:
      - ./db/registry:/docker-entrypoint-initdb.d:ro
      - registry-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iot} -d ${POSTGRES_DB:-iot}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy: *deploy-db
    networks: [iot_network]

  timeseries-db:
    image: timescale/timescaledb:latest-pg16@sha256:87f39af0a38cb42e4add367d9dfad2087a53fe5c9b24b5bc0dc66bd204b0665f
    container_name: iot-timeseries-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot}
      POSTGRES_DB: ${POSTGRES_DB:-iot}
    volumes:
      - ./db/timeseries:/docker-entrypoint-initdb.d:ro
      - timeseries-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iot} -d ${POSTGRES_DB:-iot}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy: *deploy-ts
    networks: [iot_network]

  alerts-db:
    image: postgres:16-alpine
    container_name: iot-alerts-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot}
      POSTGRES_DB: ${POSTGRES_DB:-iot}
    volumes:
      - ./db/alerts:/docker-entrypoint-initdb.d:ro
      - alerts-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iot} -d ${POSTGRES_DB:-iot}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy: *deploy-db
    networks: [iot_network]

  # ─── Infraestructura ──────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine@sha256:606d8c0d6b3c18d1da9afc53bc7cdb2a8d5486df91b5a9830e9e07626c9ae281
    container_name: iot-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    deploy: *deploy-mq
    networks: [iot_network]

  redis:
    image: redis:7-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    container_name: iot-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    deploy: *deploy-small
    networks: [iot_network]

  mailhog:
    image: mailhog/mailhog:latest@sha256:8d76a3d4ffa32a3661311944007a415332c4bb855657f4f6c57996405c009bea
    container_name: iot-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped
    deploy: *deploy-small
    networks: [iot_network]

  # ─── Microservicios ───────────────────────────────────────────
  # Solo el gateway (8000), ingestion (8001, edge de datos de dispositivos),
  # analytics (8004) y alerts (8003) se publican al host. identity, registry y
  # processing son internos: se alcanzan únicamente por la red iot_network.
  identity:
    build:
      context: ./identity
      dockerfile: Dockerfile
    container_name: iot-identity
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-iot}:${POSTGRES_PASSWORD:-iot}@identity-db:5432/${POSTGRES_DB:-iot}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-no-reply@iot.local}
    depends_on:
      identity-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy: *deploy-app
    networks: [iot_network]

  registry:
    build:
      context: ./registry
      dockerfile: Dockerfile
    container_name: iot-registry
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-iot}:${POSTGRES_PASSWORD:-iot}@registry-db:5432/${POSTGRES_DB:-iot}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
    depends_on:
      registry-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy: *deploy-app
    networks: [iot_network]

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: iot-gateway
    ports:
      - "8000:8000"
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
    depends_on:
      redis:
        condition: service_healthy
      identity:
        condition: service_healthy
      registry:
        condition: service_healthy
      alerts:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy: *deploy-app
    networks: [iot_network]

  ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    container_name: iot-ingestion
    ports:
      - "8001:8001"
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      EXCHANGE_NAME: sensor_data_exchange
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      PUBLISHER_CONFIRMS: ${PUBLISHER_CONFIRMS:-true}
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy: *deploy-app
    networks: [iot_network]

  processing:
    build:
      context: ./processing
      dockerfile: Dockerfile
    container_name: iot-processing
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-iot}:${POSTGRES_PASSWORD:-iot}@timeseries-db:5432/${POSTGRES_DB:-iot}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      EXCHANGE_NAME: sensor_data_exchange
      QUEUE_NAME: processing_queue
      REDIS_CACHE_TTL: 300
    depends_on:
      timeseries-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy: *deploy-app
    networks: [iot_network]

  alerts:
    build:
      context: ./alerts
      dockerfile: Dockerfile
    container_name: iot-alerts
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-iot}:${POSTGRES_PASSWORD:-iot}@alerts-db:5432/${POSTGRES_DB:-iot}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      EXCHANGE_NAME: sensor_data_exchange
      QUEUE_NAME: alerts_queue
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-alerts@iot.local}
      ALERT_EMAILS: ${ALERT_EMAILS:-}
    depends_on:
      alerts-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy: *deploy-app
    networks: [iot_network]

  analytics:
    build:
      context: ./analytics
      dockerfile: Dockerfile
    container_name: iot-analytics
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-iot}:${POSTGRES_PASSWORD:-iot}@timeseries-db:5432/${POSTGRES_DB:-iot}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      EXCHANGE_NAME: sensor_data_exchange
      QUEUE_NAME: analytics_queue
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      REGISTRY_URL: http://registry:8006
      ALERTS_URL: http://alerts:8003
    depends_on:
      timeseries-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy: *deploy-app
    networks: [iot_network]

  # ─── Simulador ────────────────────────────────────────────────
  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: iot-simulator
    environment:
      GATEWAY_URL: http://gateway:8000
      INGESTION_URL: http://ingestion:8001
      OPERATOR_EMAIL: ${OPERATOR_EMAIL:-operator@iot.local}
      OPERATOR_PASSWORD: ${OPERATOR_PASSWORD:-Operator1234!}
      MODE: ${MODE:-continuous}
      INTERVAL: ${INTERVAL:-60}
    depends_on:
      gateway:
        condition: service_healthy
      ingestion:
        condition: service_healthy
    profiles:
      - simulator
    restart: "no"
    deploy: *deploy-small
    networks: [iot_network]

  # ─── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_GATEWAY_URL: ${VITE_GATEWAY_URL:-http://localhost:8000}
        VITE_ANALYTICS_URL: ${VITE_ANALYTICS_URL:-http://localhost:8004}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8003}
    container_name: iot-frontend
    ports:
      - "80:80"
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    deploy: *deploy-small
    networks: [iot_network]

networks:
  iot_network:
    driver: bridge

volumes:
  identity-data:
  registry-data:
  timeseries-data:
  alerts-data:
  rabbitmq-data:
  redis-data:
